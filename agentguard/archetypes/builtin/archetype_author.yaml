id: "archetype_author"
name: "AgentGuard Archetype Author"
description: >
  Meta-archetype for creating new AgentGuard archetype definitions.
  Outputs a valid, schema-compliant archetype YAML file along with a README
  explaining the archetype's purpose, expected inputs, and self-challenge criteria.
  Use this when you need to define a new project blueprint for the AgentGuard pipeline.
version: "1.0.0"
maturity: "production"

tech_stack:
  defaults:
    language: "python"
    framework: "none"
    database: "none"
    testing: "pytest"
    linter: "ruff"
    type_checker: "mypy"
  overridable: false

pipeline:
  levels: ["skeleton", "contracts", "wiring", "logic"]
  enable_self_challenge: true
  enable_structural_validation: true
  max_self_challenge_retries: 3

structure:
  expected_dirs:
    - "archetype/"
    - "examples/"
    - "tests/"
  expected_files:
    - "archetype/{archetype_id}.yaml"
    - "archetype/README.md"
    - "examples/sample_spec.md"
    - "tests/test_schema_validation.py"
    - "tests/test_dry_run.py"

context_recipes:
  skeleton:
    include: ["spec", "archetype_structure"]
    max_tokens: 4000
  contracts:
    include: ["spec", "skeleton", "reference_patterns"]
    max_tokens: 8000
  wiring:
    include: ["contracts", "skeleton"]
    max_tokens: 8000
  logic:
    include: ["function_stub", "function_tests", "function_deps", "reference_patterns"]
    max_tokens: 6000

validation:
  checks: ["syntax", "structure"]
  lint_rules: "ruff:default"
  type_strictness: "off"

self_challenge:
  criteria:
    # ── Schema compliance ──
    - "Archetype ID is a valid slug: lowercase alphanumeric + underscores, 3-64 chars, starts with letter"
    - "Version follows semver (MAJOR.MINOR.PATCH)"
    - "Maturity is one of: prototype, production, enterprise"
    - "Description is non-empty and under 2000 characters"
    # ── Tech stack validity ──
    - "Language is one of: python, typescript, javascript, go, rust, java, csharp, ruby"
    - "Framework is one of: fastapi, flask, django, express, nextjs, react, vue, svelte, gin, actix, spring, rails, click, typer, none, stdlib"
    - "Database is one of: postgresql, mysql, sqlite, mongodb, redis, dynamodb, none"
    - "Testing framework is one of: pytest, jest, vitest, mocha, go_test, cargo_test, junit, rspec, unittest"
    - "Linter is one of: ruff, eslint, biome, golangci-lint, clippy, checkstyle, rubocop, none"
    - "Type checker is one of: mypy, pyright, tsc, none"
    # ── Pipeline correctness ──
    - "Pipeline levels start with 'skeleton' and contain only: skeleton, contracts, wiring, logic"
    - "max_self_challenge_retries is between 0 and 10"
    - "Context recipes only reference levels that exist in the pipeline"
    - "Context recipe max_tokens is between 100 and 200000"
    # ── Structure safety ──
    - "No path traversal (..) in expected_dirs or expected_files"
    - "No absolute paths in structure (no leading / or \\)"
    - "Structure paths use {project_name} or {archetype_id} placeholder, not hardcoded names"
    # ── Self-challenge quality ──
    - "Self-challenge criteria list is non-empty (at least 5 criteria)"
    - "Each criterion is a concrete, verifiable statement — not vague"
    - "Criteria cover: correctness, imports, error handling, no hardcoded secrets"
    - "grounding_check is true"
    - "assumptions_must_declare is true"
    # ── Reference patterns ──
    - "Reference pattern names are lowercase alphanumeric + underscores"
    - "Reference patterns are relevant to the archetype's tech stack — no invented or unrelated patterns"
    # ── Overall coherence ──
    - "Tech stack choices are internally consistent (e.g. pytest for Python, vitest for TypeScript)"
    - "Validation checks match the language (e.g. 'lint' needs a valid linter, 'types' needs a valid type_checker)"
    - "Structure directories match the framework conventions of the chosen tech stack"
    - "The archetype solves a real, distinct use case — not a duplicate of existing built-in archetypes"
    - "Description clearly communicates what kind of project this archetype blueprints"
    - "Infrastructure files (if any) do not contain path traversal and are relevant to the maturity level"
    - "Test functions in test_schema_validation.py have module-level docstrings"
    - "Pytest fixture functions have return type annotations (e.g. def archetype() -> dict[str, Any]:)"
  grounding_check: true
  assumptions_must_declare: true

reference_patterns:
  - "yaml_document_pattern"
  - "archetype_schema_pattern"
  - "pydantic_schema_pattern"
  - "pytest_fixture_pattern"

target_output: "Schema-compliant AgentGuard archetype YAML file with README, sample spec, and pytest schema-validation suite"

scoring_weights:
  # This archetype outputs YAML files + test stubs, NOT runnable Python applications.
  # Weights reflect what actually matters for archetype quality.

  # Enterprise
  type_safety: 0.2        # Tests can have annotations; YAML output cannot — low weight
  modularity: 0.5         # File separation (YAML / README / examples / tests) is relevant
  maintainability: 1.0    # README quality and consistent naming are core outputs
  accessibility: 0.0      # N/A — archetype files have no UI
  performance: 0.0        # N/A — YAML files have no runtime performance
  observability: 0.0      # N/A — no running service is produced
  testability: 1.0        # Schema-validation tests are the primary quality gate

  # Operational
  debuggability: 0.0      # N/A — no running service; archetype YAML has no runtime error paths
  feature_extensibility: 0.3  # Criteria and reference_patterns can be extended
  cloud_scalability: 0.0  # N/A
  api_migration_cost: 0.0 # N/A — archetype YAML files are not API contracts
  test_surface: 1.0       # Validation test coverage is core
  team_onboarding: 1.0    # README + sample_spec.md ARE the main deliverable

id: "debug_frontend"
name: "Frontend Debugger"
description: "Debugging protocol for frontend applications: React, Vue, Angular, and browser-based UIs"
version: "1.0.0"
maturity: "production"

tech_stack:
  defaults:
    language: "typescript"
    framework: "react"
    database: ""
    testing: "vitest"
    linter: "eslint"
    type_checker: "tsc"
  overridable: true

pipeline:
  levels: ["skeleton", "contracts", "wiring", "logic"]
  enable_self_challenge: true
  enable_structural_validation: true
  max_self_challenge_retries: 2

structure:
  expected_dirs: []
  expected_files: []

validation:
  checks: ["syntax", "imports", "types", "structure"]
  lint_rules: "eslint:recommended"
  type_strictness: "basic"

self_challenge:
  criteria:
    - "Root cause is identified with specific component or file and line reference"
    - "Fix does not mutate state directly — all state updates go through the appropriate setter or reducer"
    - "Fix does not introduce missing dependency array entries in hooks (useEffect, useMemo, useCallback)"
    - "Fix does not cause unnecessary re-renders — affected parent/child re-render chain is considered"
    - "Fix does not remove or bypass error boundary behaviour"
    - "No API keys, tokens, or user data are logged or exposed to the client"
    - "All affected sibling or parent components that depend on the changed prop/state are updated"
  grounding_check: true
  assumptions_must_declare: true

debug_config:
  data_sources:
    - "Browser console errors and warnings (provided by user)"
    - "Stack trace or error boundary fallback message"
    - "Relevant component files identified from the stack trace"
    - "Network tab: failed or unexpected HTTP requests/responses"
    - "React DevTools component tree and props/state snapshot (if provided)"
    - "TypeScript compiler errors (tsc output)"
    - "Test output if a failing test was provided"
    - "package.json and lock file for dependency version context"

  hypothesis_protocol:
    - "Identify the symptom: what is visually or behaviourally wrong"
    - "Classify the failure type: render error, state bug, network error, type error, or style regression"
    - "Locate the component boundary where the symptom originates"
    - "Trace the data flow: where does the data come from, how does it reach the failing component"
    - "Form at most 3 ranked hypotheses, ordered by most likely root cause first"
    - "For each hypothesis state: what evidence supports it, what would disprove it"
    - "Select the highest-confidence hypothesis before writing any code"

  fix_protocol:
    - "Write the minimal change that addresses the root cause — do not refactor unrelated components"
    - "Verify hook dependency arrays are correct after any change to hooks"
    - "Verify the fix does not break existing test snapshots or assertions"
    - "Describe how to manually reproduce and verify the fix in the browser"
    - "If the fix requires a backend API change, state it explicitly and escalate"

  escalation_criteria:
    - "Root cause cannot be determined from the provided sources — request browser console output or a reproduction repo"
    - "Fix requires changing a shared design system component used across many pages"
    - "Fix requires changing an API contract between frontend and backend"
    - "The bug only reproduces in a specific browser or device — request that information"
    - "The symptom is a performance regression — escalate with profiler data requested"
    - "The fix would affect more than 4 components across more than 2 feature areas"
